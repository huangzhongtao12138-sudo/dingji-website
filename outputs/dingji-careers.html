<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <meta property="og:url" content="https://www.djzhuangshi.com/dingji-careers.html">
  <meta name="theme-color" content="#f30700">
  <style>
    :root {
      --red: #f30700;
      --red-deep: #b80000;
      --ink: #171815;
      --muted: rgba(23,24,21,.58);
      --line: rgba(23,24,21,.1);
      --paper: #f4f3ea;
      --ease: cubic-bezier(.16, 1, .3, 1);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 76% 12%, rgba(243,7,0,.12), transparent 28%),
        radial-gradient(circle at 15% 12%, rgba(255,255,255,.92), transparent 30%),
        linear-gradient(135deg, #e9e7dc 0%, #fbfaf5 48%, #dedbcb 100%);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button, input, textarea, select { font: inherit; }

    .nav {
      position: fixed;
      z-index: 50;
      top: 24px;
      left: clamp(16px, 3vw, 44px);
      right: clamp(16px, 3vw, 44px);
      display: grid;
      grid-template-columns: minmax(190px, 1fr) auto minmax(190px, 1fr);
      align-items: center;
      gap: 20px;
      pointer-events: none;
    }
    .brand,
    .nav-links,
    .nav-pill {
      pointer-events: auto;
      backdrop-filter: blur(22px) saturate(1.2);
      -webkit-backdrop-filter: blur(22px) saturate(1.2);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      width: fit-content;
      min-width: 0;
      padding: 6px 14px 6px 6px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(255,255,255,.8), rgba(255,255,255,.42));
      box-shadow: 0 20px 60px rgba(32,33,29,.12), inset 0 1px 0 rgba(255,255,255,.92);
    }
    .brand-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,.92);
      overflow: hidden;
    }
    .brand-mark img {
      width: 64px;
      transform: translateX(-1px);
    }
    .brand-name strong {
      display: block;
      font-size: 17px;
      line-height: 1;
      font-weight: 860;
      letter-spacing: -.035em;
    }
    .brand-name span {
      display: block;
      margin-top: 3px;
      color: rgba(23,24,21,.56);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .nav-links {
      position: relative;
      justify-self: center;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(255,255,255,.72), rgba(255,255,255,.34));
      box-shadow: 0 22px 64px rgba(32,33,29,.11), inset 0 1px 0 rgba(255,255,255,.9);
      overflow: hidden;
    }
    .liquid-thumb,
    .liquid-trail {
      position: absolute;
      z-index: 0;
      left: 0;
      top: 0;
      border-radius: 999px;
      pointer-events: none;
      transform: translate3d(var(--x, 7px), var(--y, 7px), 0);
    }
    .liquid-thumb {
      width: var(--w, 80px);
      height: var(--h, 42px);
      background: radial-gradient(circle at 22% 18%, rgba(255,255,255,.96), transparent 35%), linear-gradient(145deg, rgba(255,255,255,.92), rgba(255,255,255,.38));
      box-shadow: 0 12px 32px rgba(32,33,29,.11), inset 0 0 0 1px rgba(255,255,255,.78);
      transition: transform .52s var(--ease), width .52s var(--ease), height .52s var(--ease);
    }
    .liquid-trail {
      width: calc(var(--w, 80px) * 1.18);
      height: calc(var(--h, 42px) * 1.08);
      opacity: .44;
      background: rgba(255,255,255,.38);
      filter: blur(12px);
      transition: transform .68s var(--ease), width .68s var(--ease), height .68s var(--ease);
    }
    .nav-links a {
      position: relative;
      z-index: 1;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 17px;
      border-radius: 999px;
      color: rgba(20,22,18,.72);
      font-size: 14px;
      font-weight: 650;
      white-space: nowrap;
      transition: color .28s var(--ease), transform .28s var(--ease);
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--red-deep);
      transform: translateY(-1px);
    }
    .nav-pill {
      justify-self: end;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      padding: 0 20px;
      border: 1px solid rgba(255,255,255,.74);
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(255,255,255,.74), rgba(255,255,255,.36));
      color: rgba(23,24,21,.62);
      font-size: 14px;
      font-weight: 760;
      white-space: nowrap;
      box-shadow: 0 18px 48px rgba(32,33,29,.1), inset 0 1px 0 rgba(255,255,255,.9);
    }
    .nav-pill i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 18px rgba(243,7,0,.5);
    }

    .page {
      position: relative;
      min-height: 100svh;
      padding: clamp(130px, 15vh, 180px) clamp(24px, 5vw, 96px) clamp(44px, 7vh, 86px);
      isolation: isolate;
      overflow: hidden;
    }
    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -4;
      pointer-events: none;
      opacity: .18;
      background-image:
        radial-gradient(circle, rgba(23,24,21,.25) 0 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,.74) 0 1px, transparent 1px);
      background-size: 6px 6px, 13px 13px;
      mix-blend-mode: multiply;
    }
    .falling-layer {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      overflow: hidden;
    }
    .falling-word {
      position: absolute;
      left: var(--x);
      top: -18vh;
      color: rgba(243,7,0,.1);
      font-size: var(--s);
      font-weight: 940;
      letter-spacing: -.06em;
      filter: blur(var(--b));
      transform: translate3d(0, -20vh, 0) rotate(var(--r));
      animation: fallGlyph var(--d) var(--delay) var(--ease) forwards;
      will-change: transform, opacity;
    }
    .falling-word.dark { color: rgba(23,24,21,.08); }
    .falling-word.red { color: rgba(243,7,0,.16); }
    .career-orb {
      position: fixed;
      z-index: -2;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.65);
      background: linear-gradient(145deg, rgba(255,255,255,.52), rgba(255,255,255,.12));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transform: translate3d(calc(var(--mx, 0) * var(--dx, 40px)), calc(var(--my, 0) * var(--dy, 28px)), 0) rotate(var(--r, -8deg));
      transition: transform .14s linear;
    }
    .career-orb.one {
      width: clamp(170px, 20vw, 360px);
      height: clamp(86px, 9vw, 150px);
      right: 9vw;
      top: 16vh;
      --dx: -68px;
      --dy: 42px;
      --r: -14deg;
    }
    .career-orb.two {
      width: clamp(130px, 14vw, 250px);
      height: clamp(130px, 14vw, 250px);
      left: 47vw;
      bottom: 7vh;
      --dx: 50px;
      --dy: -48px;
      --r: 8deg;
    }
    .career-hero {
      min-height: calc(100svh - clamp(190px, 22vh, 240px));
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, .92fr);
      align-items: end;
      gap: clamp(34px, 5vw, 86px);
    }
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 0 0 22px;
      color: rgba(23,24,21,.62);
      font-size: clamp(18px, 1.45vw, 28px);
      font-weight: 860;
      letter-spacing: -.02em;
      white-space: nowrap;
    }
    .eyebrow::before {
      content: "";
      width: clamp(56px, 6vw, 110px);
      height: 4px;
      border-radius: 99px;
      background: var(--red);
    }
    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(92px, 11vw, 220px);
      line-height: .9;
      font-weight: 940;
      letter-spacing: -.08em;
    }
    h1 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.35px rgba(23,24,21,.25);
      text-stroke: 1.35px rgba(23,24,21,.25);
    }
    .career-copy {
      margin-top: clamp(24px, 4vh, 44px);
      color: rgba(23,24,21,.66);
      font-size: clamp(21px, 1.65vw, 34px);
      line-height: 1.55;
      font-weight: 850;
      letter-spacing: -.04em;
    }
    .career-copy span { display: block; white-space: nowrap; }
    .job-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }
    .job-tags span {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 0 18px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 999px;
      background: rgba(255,255,255,.44);
      color: rgba(23,24,21,.6);
      font-size: 15px;
      font-weight: 850;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.82);
    }
    .career-panel {
      position: relative;
      padding: clamp(26px, 3.2vw, 46px);
      border: 1px solid rgba(255,255,255,.78);
      border-radius: clamp(30px, 4vw, 56px);
      background:
        radial-gradient(circle at var(--card-x, 28%) var(--card-y, 20%), rgba(255,255,255,.82), transparent 30%),
        linear-gradient(145deg, rgba(255,255,255,.64), rgba(255,255,255,.26));
      box-shadow: 0 34px 90px rgba(32,33,29,.12), inset 0 1px 0 rgba(255,255,255,.9);
      backdrop-filter: blur(24px) saturate(1.16);
      -webkit-backdrop-filter: blur(24px) saturate(1.16);
      transform: perspective(1200px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
      transition: transform .24s var(--ease);
    }
    .career-panel h2 {
      margin: 0 0 8px;
      font-size: clamp(28px, 2.6vw, 48px);
      line-height: 1.05;
      letter-spacing: -.06em;
    }
    .career-panel p {
      margin: 0 0 24px;
      color: rgba(23,24,21,.56);
      font-size: 15px;
      font-weight: 740;
      line-height: 1.75;
    }
    .career-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .field {
      display: grid;
      gap: 8px;
    }
    .field.wide { grid-column: 1 / -1; }
    .field span {
      color: rgba(23,24,21,.48);
      font-size: 13px;
      font-weight: 850;
      letter-spacing: .04em;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 54px;
      border: 1px solid rgba(23,24,21,.1);
      border-radius: 20px;
      outline: none;
      padding: 0 16px;
      background: rgba(255,255,255,.55);
      color: var(--ink);
      font-size: 15px;
      font-weight: 780;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.82);
      transition: border-color .24s var(--ease), box-shadow .24s var(--ease), background .24s var(--ease);
    }
    .field textarea {
      min-height: 112px;
      padding: 16px;
      resize: vertical;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(243,7,0,.34);
      background: rgba(255,255,255,.74);
      box-shadow: 0 0 0 5px rgba(243,7,0,.08), inset 0 1px 0 rgba(255,255,255,.9);
    }
    .form-actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 6px;
    }
    .btn {
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 0 26px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(255,255,255,.8), rgba(255,255,255,.38));
      box-shadow: 0 18px 50px rgba(32,33,29,.1), inset 0 1px 0 rgba(255,255,255,.9);
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
      transition: transform .34s var(--ease), color .28s var(--ease), box-shadow .34s var(--ease);
    }
    .btn:hover {
      color: var(--red-deep);
      transform: translateY(-3px) scale(1.025);
      box-shadow: 0 26px 66px rgba(32,33,29,.14), inset 0 1px 0 rgba(255,255,255,.94);
    }
    .btn.primary {
      color: #fff;
      background: linear-gradient(145deg, #ff1710, #d90000);
      box-shadow: 0 24px 56px rgba(243,7,0,.24), inset 0 1px 0 rgba(255,255,255,.34);
    }
    .btn.primary:hover { color: #fff; }
    .form-status {
      color: rgba(23,24,21,.54);
      font-size: 14px;
      font-weight: 760;
      min-height: 20px;
    }
    .career-directions {
      width: min(100%, 1480px);
      margin: clamp(46px, 7vh, 82px) auto 0;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      border-top: 1px solid rgba(23,24,21,.08);
      border-left: 1px solid rgba(23,24,21,.08);
      overflow: hidden;
      border-radius: 34px;
      background: rgba(255,255,255,.28);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .career-directions article {
      min-height: 170px;
      padding: 22px;
      border-right: 1px solid rgba(23,24,21,.08);
      border-bottom: 1px solid rgba(23,24,21,.08);
      background: rgba(255,255,255,.25);
      transition: background .3s var(--ease), transform .3s var(--ease);
    }
    .career-directions article:hover {
      background: rgba(255,255,255,.55);
      transform: translateY(-4px);
    }
    .career-directions b {
      color: var(--red);
      font-size: 13px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .career-directions h3 {
      margin: 32px 0 0;
      font-size: clamp(20px, 1.5vw, 28px);
      line-height: 1.12;
      letter-spacing: -.04em;
    }
    [data-reveal] {
      opacity: 0;
      transform: translateY(22px);
      filter: blur(10px);
      transition: opacity .82s var(--ease), transform .82s var(--ease), filter .82s var(--ease);
      transition-delay: calc(var(--reveal-index, 0) * 70ms);
    }
    [data-reveal].is-visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }
    @keyframes fallGlyph {
      0% { opacity: 0; transform: translate3d(0, -24vh, 0) rotate(var(--r)); }
      18% { opacity: .85; }
      78% { opacity: .78; }
      100% {
        opacity: .46;
        transform: translate3d(var(--drift), 112vh, 0) rotate(calc(var(--r) + var(--spin)));
      }
    }
    @media (max-width: 1180px) {
      .nav { grid-template-columns: 1fr; }
      .brand, .nav-pill { display: none; }
      .career-hero { grid-template-columns: 1fr; }
      .career-directions { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .page { padding-inline: 18px; }
      .nav-links { justify-self: stretch; overflow-x: auto; }
      .nav-links a { padding: 0 14px; }
      h1 { font-size: clamp(68px, 19vw, 112px); }
      .career-copy span { white-space: normal; }
      .career-form, .career-directions { grid-template-columns: 1fr; }
    }
  
    /* Mobile layout polish 2026-07-06 */
    @media (max-width: 780px) {
      html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
      .nav { top: max(8px, env(safe-area-inset-top)) !important; left: 10px !important; right: 10px !important; display: grid !important; grid-template-columns: auto minmax(0, 1fr) !important; align-items: start !important; gap: 8px !important; z-index: 90 !important; }
      .brand { display: flex !important; min-height: 38px !important; max-width: 43vw !important; padding: 4px 8px 4px 4px !important; gap: 6px !important; border-radius: 999px !important; overflow: hidden !important; backdrop-filter: blur(16px) saturate(1.15) !important; -webkit-backdrop-filter: blur(16px) saturate(1.15) !important; }
      .brand-mark { width: 34px !important; height: 30px !important; min-width: 34px !important; }
      .brand-mark img { width: 40px !important; height: auto !important; }
      .brand-name { min-width: 0 !important; }
      .brand-name strong { display: block !important; font-size: 12px !important; line-height: 1 !important; white-space: nowrap !important; }
      .brand-name span { display: block !important; margin-top: 3px !important; font-size: 7px !important; line-height: 1 !important; letter-spacing: .08em !important; white-space: nowrap !important; }
      .nav-links { display: flex !important; justify-self: end !important; max-width: 54vw !important; min-width: 0 !important; min-height: 38px !important; padding: 5px !important; gap: 2px !important; overflow-x: auto !important; overflow-y: hidden !important; border-radius: 999px !important; scrollbar-width: none !important; backdrop-filter: blur(18px) saturate(1.18) !important; -webkit-backdrop-filter: blur(18px) saturate(1.18) !important; }

      .nav-links a { flex: 0 0 auto !important; min-height: 28px !important; padding: 0 10px !important; font-size: 11px !important; line-height: 28px !important; white-space: nowrap !important; }
      .nav-pill { display: none !important; }
      .liquid-cursor, .cursor-dot { display: none !important; }

      .hero-btn, .about-btn, .contact-actions a, .btn, .pill-btn { min-height: 46px !important; padding: 0 15px !important; font-size: 13px !important; white-space: nowrap !important; }
      h1, h2, h3, p, a, button, span, strong, b { text-size-adjust: 100%; -webkit-text-size-adjust: 100%; }
    }
    @media (max-width: 430px) {
      .brand { max-width: 39vw !important; padding-right: 7px !important; }
      .brand-mark { width: 30px !important; height: 27px !important; min-width: 30px !important; }
      .brand-mark img { width: 36px !important; }
      .brand-name strong { font-size: 11px !important; }
      .brand-name span { font-size: 6.5px !important; }
      .nav-links { max-width: 57vw !important; padding: 4px !important; }
      .nav-links a { min-height: 27px !important; line-height: 27px !important; padding: 0 9px !important; font-size: 10.5px !important; }
    }
    /* End mobile layout polish */

    /* Subpage mobile composition 2026-07-06 */
    @media (max-width: 780px) {
      main, .page, .site-main { padding-top: 88px !important; padding-left: 16px !important; padding-right: 16px !important; }
      .hero, .hero-copy, .case-hero, .service-hero, .career-hero, .honors-hero, .section-title, .factory-board, .honor-board, .archive-shell, .contact-shell { grid-template-columns: 1fr !important; gap: 22px !important; }
      h1, .hero h1, .case-title, .service-title, .career-title, .honors-title { font-size: clamp(3rem, 14.5vw, 5rem) !important; line-height: .9 !important; letter-spacing: 0 !important; white-space: normal !important; }
      .section-title h2, .split-title, .panel-title { font-size: clamp(2.25rem, 11vw, 4.2rem) !important; line-height: .95 !important; white-space: normal !important; }
      .hero-text span, .hero-copy span, .section-title p span, .lede span, .summary span { display: inline !important; white-space: normal !important; }
      .hero, .section, .content-section, .archive-section { padding-top: 40px !important; padding-bottom: 44px !important; }
      .service-grid, .scope-grid, .case-grid, .brand-rail, .case-detail-grid, .system-panel, .honor-grid, .credential-grid, .contact-grid { grid-template-columns: 1fr !important; }
      .brand-rail, .logo-strip, .project-strip { overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; }
      .glass-panel, .board, .archive, .form-panel, .contact-panel, .honor-card, .credential-card { border-radius: 26px !important; padding: 16px !important; }
      .doc-image, .credential-card img, .honor-card img { max-height: 70svh !important; width: 100% !important; object-fit: contain !important; }
      footer { padding-left: 16px !important; padding-right: 16px !important; }
    }
    @media (max-width: 430px) {
      main, .page, .site-main { padding-left: 12px !important; padding-right: 12px !important; }
      h1, .hero h1, .case-title, .service-title, .career-title, .honors-title { font-size: clamp(2.55rem, 14vw, 4.2rem) !important; }
      .section-title h2, .split-title, .panel-title { font-size: clamp(2rem, 10.5vw, 3.4rem) !important; }
    }

</head>

  <script>
    const root = document.documentElement;
    const nav = document.querySelector('.nav-links');
    const navLinks = [...document.querySelectorAll('.nav-links a')];
    const thumb = document.querySelector('.liquid-thumb');
    const trail = document.querySelector('.liquid-trail');
    const panel = document.querySelector('.career-panel');
    const form = document.querySelector('.career-form');
    const statusText = document.querySelector('.form-status');
    const revealItems = [...document.querySelectorAll('[data-reveal]')];
    const fallingLayer = document.querySelector('.falling-layer');

    function setLiquidTarget(target, immediate = false) {
      if (!target || !nav || !thumb || !trail) return;
      const navRect = nav.getBoundingClientRect();
      const rect = target.getBoundingClientRect();
      [thumb, trail].forEach((el) => {
        el.style.setProperty('--x', `${rect.left - navRect.left}px`);
        el.style.setProperty('--y', `${rect.top - navRect.top}px`);
        el.style.setProperty('--w', `${rect.width}px`);
        el.style.setProperty('--h', `${rect.height}px`);
        if (immediate) {
          el.style.transitionDuration = '0ms';
          requestAnimationFrame(() => { el.style.transitionDuration = ''; });
        }
      });
    }
    navLinks.forEach((link) => {
      link.addEventListener('pointerenter', () => setLiquidTarget(link));
      link.addEventListener('focus', () => setLiquidTarget(link));
    });
    nav?.addEventListener('pointerleave', () => setLiquidTarget(document.querySelector('.nav-links a.active')));
    window.addEventListener('resize', () => setLiquidTarget(document.querySelector('.nav-links a.active'), true));
    window.addEventListener('pointermove', (event) => {
      const mx = (event.clientX / innerWidth - .5) * 2;
      const my = (event.clientY / innerHeight - .5) * 2;
      root.style.setProperty('--mx', mx.toFixed(3));
      root.style.setProperty('--my', my.toFixed(3));
      if (panel) {
        const rect = panel.getBoundingClientRect();
        const px = (event.clientX - rect.left) / rect.width;
        const py = (event.clientY - rect.top) / rect.height;
        panel.style.setProperty('--card-x', `${px * 100}%`);
        panel.style.setProperty('--card-y', `${py * 100}%`);
        panel.style.setProperty('--rx', `${-(py - .5) * 8}deg`);
        panel.style.setProperty('--ry', `${(px - .5) * 10}deg`);
      }
    }, { passive: true });
    panel?.addEventListener('pointerleave', () => {
      panel.style.setProperty('--rx', '0deg');
      panel.style.setProperty('--ry', '0deg');
    });
    form?.addEventListener('submit', (event) => {
      event.preventDefault();
      if (statusText) statusText.textContent = '已记录为本地意向，请继续通过电话或邮箱与鼎基团队确认。';
    });

    function buildFallingWords() {
      if (!fallingLayer) return;
      const words = ['加入我们', 'JOIN', 'DINGJI', '空间工程', '项目管理', '设计深化', '施工管理', 'TOP'];
      const count = matchMedia('(max-width: 720px)').matches ? 22 : 42;
      fallingLayer.textContent = '';
      for (let i = 0; i < count; i += 1) {
        const span = document.createElement('span');
        span.className = `falling-word ${i % 5 === 0 ? 'red' : i % 3 === 0 ? 'dark' : ''}`;
        span.textContent = words[i % words.length];
        span.style.setProperty('--x', `${Math.random() * 92 + 2}%`);
        span.style.setProperty('--s', `${Math.random() * 34 + 28}px`);
        span.style.setProperty('--d', `${Math.random() * 3.2 + 5.2}s`);
        span.style.setProperty('--delay', `${Math.random() * 1.8}s`);
        span.style.setProperty('--drift', `${(Math.random() - .5) * 28}vw`);
        span.style.setProperty('--r', `${(Math.random() - .5) * 40}deg`);
        span.style.setProperty('--spin', `${(Math.random() - .5) * 130}deg`);
        span.style.setProperty('--b', `${Math.random() * 3}px`);
        fallingLayer.appendChild(span);
      }
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: .12, rootMargin: '0px 0px -8% 0px' });
    revealItems.forEach((item) => observer.observe(item));
    buildFallingWords();
    setLiquidTarget(document.querySelector('.nav-links a.active'), true);
  </script>
</body>
